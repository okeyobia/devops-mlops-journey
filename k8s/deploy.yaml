apiVersion: v1
kind: Namespace
metadata:
  name: book-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deployment
  namespace: book-api
  annotations:
    argocd-image-updater.argoproj.io/image-list: "fastapi=okeyobia/book-api:latest"
    argocd-image-updater.argoproj.io/book-api.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git
  labels:
    app: fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: okeyobia/book-api:latest # argo image updater will update this tag
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "0.5"
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
      # Remove Argo CD Image Updater annotations (now managed by CI/CD)
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-lb
  namespace: book-api
spec:
  selector:
    app: fastapi
  ports:
    - port: 80
      targetPort: 8000
  type: LoadBalancer
