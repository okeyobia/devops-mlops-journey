name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-path: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Pytest
        run: uv run pytest

  build-and-push:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only build on merge to main
    steps:
      - uses: actions/checkout@v4

      - name: Derive short SHA
        id: meta
        run: echo "short_sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/book-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/book-api:${{ steps.meta.outputs.short_sha }}
          # Use GitHub's cache to speed up Docker layer building on subsequent runs
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deployment.yaml with new image tag
        run: |
          sed -i "s|image: .*/book-api:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/book-api:${{ steps.meta.outputs.short_sha }}|" k8s/deploy.yaml
      - name: Commit manifest change
        env:
         PUSH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          if git diff --cached --quiet; then
           echo "No manifest updates to commit"
           exit 0
          fi
          git commit -m "Update image tag to ${{ github.sha }}"
          git push https://${PUSH_TOKEN}@github.com/${{ github.repository }} HEAD:main   

        #   git config --global user.email \"github-actions[bot]@users.noreply.github.com\"
        #   git config --global user.name \"github-actions[bot]\"
        #   git add k8s/deploy.yaml
        #   git commit -m \"ci: update image tag to ${{ steps.meta.outputs.short_sha }} [skip ci]\" || echo "No changes to commit."
        #   git push

  terraform-apply:
    name: Terraform Apply (Minikube)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Prevent apply from running on PRs
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.4

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false